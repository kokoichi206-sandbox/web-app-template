# ==========================================================
# 週次コード監査ワークフロー
#
# main ブランチに対して包括的な監査を実行し、
# 結果を GitHub Issue として報告する。
#
# CAUTION:
# (2025/12/30 現在) Anthropic 社の利用規約に以下の記載があり、
# GitHub Actions ワークフローでの複数人の利用が抵触する可能性がある。
#
# > You may not share your Account login information, Anthropic API key, or Account credentials with anyone else.
# > You also may not make your Account available to anyone else.
#
# ref: https://www.anthropic.com/legal/consumer-terms
# ==========================================================

name: weekly-audit

on:
  # 毎週月曜日 AM 9:00 (JST) に実行。
  schedule:
    - cron: "0 0 * * 1"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "ドライラン (Issue を作成しない)"
        required: false
        default: false
        type: boolean

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      NODE_OPTIONS: "--max-old-space-size=4096"
    permissions:
      contents: write # レポートファイルのコミット用
      issues: write # Issue 作成用
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0

      - name: Get Node.js version
        id: node-version
        run: echo "version=$(jq -r '.devEngines.runtime.version' package.json)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Weekly Audit
        id: audit
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            issues: write
          prompt: |
            /audit-run ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

            main ブランチに対して包括的な監査を実行してください。
            監査完了後、結果を GitHub Issue として作成してください。
          claude_args: "--settings .claude/settings.json"

      - name: Create PR for audit reports
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 監査レポートが生成されていれば追加
          if [ -d "docs/audits" ]; then
            git add docs/audits/
            if git diff --staged --quiet; then
              echo "No audit reports to commit"
            else
              BRANCH_NAME="audit/weekly-$(date +%Y-%m-%d)"
              git checkout -b "$BRANCH_NAME"
              git commit -m "docs: add weekly audit report $(date +%Y-%m-%d)

              Co-Authored-By: Claude <noreply@anthropic.com>"
              git push origin "$BRANCH_NAME"

              gh pr create \
                --base main \
                --head "$BRANCH_NAME" \
                --title "docs: add weekly audit report $(date +%Y-%m-%d)" \
                --body "## Summary

                Weekly audit report generated by Claude Code.

                ## Test plan

                - [x] Audit reports generated successfully

                Generated with Claude Code" || echo "PR creation failed or already exists"
            fi
          fi
